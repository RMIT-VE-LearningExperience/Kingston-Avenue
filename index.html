<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kingston — Excavation Stage Viewer</title>
  <link rel="stylesheet" href="style.css" />
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <div id="app">
    <aside id="panel">
      <h1>Kingston Excavation</h1>
      <p class="sub">3D Stage Viewer</p>

      <section>
        <label class="section-label">Layers</label>
        <div id="layers"></div>
      </section>

      <section>
        <label class="section-label">Overlays</label>
        <label class="layer overlay-row" data-file="models/excavator.glb">
          <span class="swatch" style="background:#d9b53d"></span>
          <span class="name">Excavator</span>
          <span class="count">123</span>
          <span class="eye"><svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-7-11-7a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 7 11 7a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg></span>
          <input type="checkbox" />
        </label>
        <label class="layer overlay-row" data-file="models/neighbour.glb">
          <span class="swatch" style="background:#a8503c"></span>
          <span class="name">Neighbour + Wall</span>
          <span class="count">3</span>
          <span class="eye"><svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-7-11-7a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 7 11 7a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg></span>
          <input type="checkbox" />
        </label>
      </section>

      <section>
        <label class="section-label">Soil X-ray</label>
        <input type="range" id="soilOpacity" min="0" max="100" value="100" />
        <div class="rowval"><span>Transparent</span><span id="soilVal">100%</span></div>
      </section>

      <section>
        <label class="section-label">Views</label>
        <div class="btnrow">
          <button data-view="iso">Iso</button>
          <button data-view="top">Top</button>
          <button data-view="front">Front</button>
          <button data-view="side">Side</button>
        </div>
        <button id="resetBtn" class="wide">Reset Camera</button>
        <div class="btnrow zoomrow">
          <button id="zoomOutBtn" aria-label="Zoom out">−</button>
          <button id="zoomInBtn" aria-label="Zoom in">+</button>
        </div>
      </section>

      <p class="hint">Drag to orbit · scroll or +/− to zoom · right-drag to pan</p>
    </aside>

    <main id="viewport">
      <div id="loading">Loading model…</div>
      <div id="scrubber">
        <div id="scrubLabel">Stage</div>
        <input type="range" id="stageScrub" min="0" max="0" step="1" value="0" />
        <div id="scrubTicks"></div>
      </div>
    </main>
  </div>

  <script type="module" src="main.js"></script>
</body>
</html>
